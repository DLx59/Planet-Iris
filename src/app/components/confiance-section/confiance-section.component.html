<section id="confiance" class="section avis-section">
  <div class="container">
    <div class="center-title fade-in-on-scroll">
      <h2 class="title">Ils nous ont fait confiance</h2>
      <p>Pourquoi pas vous ?</p>
    </div>

    <div class="avis-grid">
      @if (hasReviews()) {
        @for (review of displayedReviews(); track review.name) {
          <div class="avis fade-in-on-scroll">
            <div class="avis-top">
              <div class="stars" [innerHTML]="buildStars(review.rating)"></div>
            </div>
            <div class="content">
              <p>&#8220;{{ review.text }}&#8221;</p>
            </div>
            <div class="avis-footer">
              <div class="avis-footer-left">
                @if (review.photo) {
                  <img class="avis-avatar"
                       [src]="review.photo"
                       [alt]="review.name"
                       loading="lazy"
                       (error)="$any($event.target).style.display='none'">
                } @else {
                  <div class="avis-avatar-placeholder">{{ getInitial(review.name) }}</div>
                }
                <span class="avis-author-name">{{ review.name }}</span>
              </div>
              <span [innerHTML]="googleLogo()"></span>
            </div>
          </div>
        }
      } @else {
        <div class="avis"></div>
        <div class="avis"></div>
        <div class="avis"></div>
      }
    </div>
  </div>
</section>
