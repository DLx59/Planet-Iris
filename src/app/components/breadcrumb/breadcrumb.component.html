<nav class="breadcrumb-nav" aria-label="Fil d'ariane">
  <ol class="breadcrumb-list">
    @for (item of items(); track item.path; let last = $last; let first = $first) {
      <li class="breadcrumb-item">
        @if (!item.current) {
          <a [routerLink]="item.path" class="breadcrumb-link">
            @if (first) {
              <span class="breadcrumb-home-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                  <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h3a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h3a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
                </svg>
              </span>
            }
            <span [transloco]="item.labelKey"></span>
          </a>
          <span class="breadcrumb-sep" aria-hidden="true">›</span>
        } @else {
          <span class="breadcrumb-current" aria-current="page">
            @if (first) {
              <span class="breadcrumb-home-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                  <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h3a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h3a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
                </svg>
              </span>
            }
            <span [transloco]="item.labelKey"></span>
          </span>
        }
      </li>
    }
  </ol>
</nav>
