<section class="article-hero fade-in-on-scroll">
  <div class="container">
    <span class="article-tag" [transloco]="hero().tagKey"></span>
    <h1 class="title" [transloco]="hero().titleKey"></h1>
    <p class="article-intro" [transloco]="hero().introKey"></p>
    <p class="article-meta">
      <span [transloco]="hero().readingTimeKey"></span>
      <span class="meta-sep">·</span>
      <span [transloco]="hero().publishedKey"></span>
    </p>
  </div>
</section>
