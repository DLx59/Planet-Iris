<app-navbar />
<app-breadcrumb />

<main>
  <section class="section contact-hero">
    <div class="container">
      <div class="contact-hero-content">
        <h1 class="title fade-in-on-scroll">Contactez-nous</h1>
        <p class="fade-in-on-scroll">
          Nous sommes joignables uniquement par message privé sur nos réseaux sociaux.<br>
          Nous vous répondons dans les plus brefs délais.
        </p>
      </div>
    </div>
  </section>

  <section class="section contact-cards-section">
    <div class="container">
      <div class="contact-cards">

        <a href="https://www.facebook.com/planet.iris.belgique/"
           target="_blank"
           rel="noopener noreferrer"
           class="contact-card fade-in-on-scroll"
           aria-label="Nous contacter sur Facebook">
          <div class="contact-card-icon">
            <img src="img/vector/facebook.svg" alt="Facebook" width="56" height="56" loading="lazy">
          </div>
          <div class="contact-card-info">
            <h2>Facebook</h2>
            <p>planet.iris.belgique</p>
          </div>
          <div class="contact-card-arrow">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/>
              <polyline points="12 5 19 12 12 19"/>
            </svg>
          </div>
        </a>

        <a href="https://www.instagram.com/planet_iris_belgique/"
           target="_blank"
           rel="noopener noreferrer"
           class="contact-card fade-in-on-scroll"
           aria-label="Nous contacter sur Instagram">
          <div class="contact-card-icon">
            <img src="img/vector/instagram.svg" alt="Instagram" width="56" height="56" loading="lazy">
          </div>
          <div class="contact-card-info">
            <h2>Instagram</h2>
            <p>planet_iris_belgique</p>
          </div>
          <div class="contact-card-arrow">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/>
              <polyline points="12 5 19 12 12 19"/>
            </svg>
          </div>
        </a>

      </div>

      <div class="contact-location fade-in-on-scroll">
        <div class="contact-location-pin">📍</div>
        <div>
          <strong>Studio Planet'Iris</strong><br>
          8580 Avelgem, Belgique<br>
          <span class="contact-location-sub">Entre Courtrai (Kortrijk) &amp; Mouscron</span>
        </div>
      </div>
    </div>
  </section>
</main>
