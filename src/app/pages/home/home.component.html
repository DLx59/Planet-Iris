<app-navbar />

<main id="main-content">
  <app-hero-section />

  <!-- Chiffres clés -->
  <section class="stats-strip">
    <div class="container">
      <div class="stats-grid">
        <div class="stat-item fade-in-on-scroll">
          <span class="stat-value" data-stat="price">50€</span>
          <span class="stat-label" transloco="stats.from"></span>
        </div>
        <div class="stat-item fade-in-on-scroll">
          <span class="stat-value" data-stat="days">3 j</span>
          <span class="stat-label" transloco="stats.digital"></span>
        </div>
        <div class="stat-item fade-in-on-scroll">
          <span class="stat-value" data-stat="unique">100%</span>
          <span class="stat-label" transloco="stats.unique"></span>
        </div>
        <div class="stat-item fade-in-on-scroll" aria-label="Note : 5 étoiles sur 5">
          <span class="stat-value" data-stat="rating" aria-hidden="true">⭐ 5/5</span>
          <span class="stat-label" transloco="stats.reviews"></span>
        </div>
      </div>
    </div>
  </section>

  <!-- Pourquoi Planet'Iris -->
  <section class="section why-section">
    <div class="container">
      <div class="center-title fade-in-on-scroll">
        <h2 class="title" transloco="why.title"></h2>
      </div>
      <div class="why-grid">
        <div class="why-card fade-in-on-scroll">
          <div class="why-icon" aria-hidden="true">👁️</div>
          <h3 transloco="why.card1.title"></h3>
          <p transloco="why.card1.desc"></p>
        </div>
        <div class="why-card fade-in-on-scroll">
          <div class="why-icon" aria-hidden="true">🎨</div>
          <h3 transloco="why.card2.title"></h3>
          <p transloco="why.card2.desc"></p>
        </div>
        <div class="why-card fade-in-on-scroll">
          <div class="why-icon" aria-hidden="true">🖼️</div>
          <h3 transloco="why.card3.title"></h3>
          <p transloco="why.card3.desc"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Comment ça marche -->
  <section class="section process-section">
    <div class="container">
      <div class="center-title fade-in-on-scroll">
        <h2 class="title" transloco="process.title"></h2>
      </div>
      <div class="stepper">
        <div class="stepper-step fade-in-on-scroll">
          <div class="stepper-head">
            <div class="stepper-dot"></div>
            <div class="stepper-line"></div>
          </div>
          <div class="stepper-body">
            <h3 transloco="process.step1.title"></h3>
            <p transloco="process.step1.desc"></p>
          </div>
        </div>
        <div class="stepper-step fade-in-on-scroll">
          <div class="stepper-head">
            <div class="stepper-dot"></div>
            <div class="stepper-line"></div>
          </div>
          <div class="stepper-body">
            <h3 transloco="process.step2.title"></h3>
            <p transloco="process.step2.desc"></p>
          </div>
        </div>
        <div class="stepper-step fade-in-on-scroll">
          <div class="stepper-head">
            <div class="stepper-dot"></div>
          </div>
          <div class="stepper-body">
            <h3 transloco="process.step3.title"></h3>
            <p transloco="process.step3.desc"></p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Avis clients -->
  <app-confiance-section />

  <!-- CTA finale -->
  <section class="section home-cta">
    <div class="container">
      <div class="home-cta-content fade-in-on-scroll">
        <h2 class="title" transloco="home-cta.title"></h2>
        <p [innerHTML]="'home-cta.desc' | transloco"></p>
        <div class="home-cta-buttons">
          <a routerLink="/services" class="button" transloco="home-cta.services"></a>
          <a routerLink="/contact" class="button button-outline" transloco="home-cta.contact"></a>
        </div>
      </div>
    </div>
  </section>

  <!-- Article teaser : affiché uniquement si un article est nouveau ou à lire -->
  <app-article-teaser-section />
</main>

<app-footer />
