# ============================================================
# Remplacer SITE_DOMAIN par ex: www.planet-iris.be
# Remplacer APP_DOMAIN  par ex: app.planet-iris.be
# Adapter les chemins Let's Encrypt si les domaines diffèrent.
# ============================================================

# ---- Site Angular SSR ----------------------------------------
server {
    listen 80;
    server_name SITE_DOMAIN;
    return 301 https://SITE_DOMAIN$request_uri;
}

server {
    listen 443 ssl;
    server_name SITE_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/SITE_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SITE_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Cache agressif pour les assets hachés (Angular ajoute un hash au nom de fichier)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|webp|ico|gif|jpg|jpeg)$ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires            1y;
        add_header         Cache-Control "public, immutable";
    }

    # Toutes les autres requêtes vers le serveur Angular SSR
    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ---- Sync server Express (existant) --------------------------
server {
    listen 80;
    server_name APP_DOMAIN;
    return 301 https://APP_DOMAIN$request_uri;
}

server {
    listen 443 ssl;
    server_name APP_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/APP_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/APP_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://127.0.0.1:3847;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
