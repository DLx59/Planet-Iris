stages:
  - build
  - backup
  - deploy

variables:
  SSH_PRIVATE_KEY: $SSH_PRIVATE_KEY
  SERVER_USER: $SERVER_USER
  SERVER_IP: $SERVER_IP
  BACKUP_DIR: $BACKUP_DIR
  DEPLOY_DIR: $DEPLOY_DIR

.ssh_setup: &ssh_setup
  before_script:
    - apk update && apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -p 65002 $SERVER_IP >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - echo -e "Host *\n  StrictHostKeyChecking no\n  Port 65002" >> ~/.ssh/config

build:
  image: node:lts-alpine
  stage: build
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run build:prod
  artifacts:
    paths:
      - dist/planet-iris/browser/
    expire_in: 1 hour
  only:
    - master

backup:
  image: alpine:latest
  stage: backup
  <<: *ssh_setup
  script:
    - DATE=$(date +%d-%m-%Y-%Hh-%Mm-%Ss)
    - ssh $SERVER_USER@$SERVER_IP "mkdir -p $BACKUP_DIR/backup_$DATE && tar czf $BACKUP_DIR/backup_$DATE/backup.tar.gz -C $DEPLOY_DIR --exclude='./planet-iris-backup' . && echo 'Deny from all' > $BACKUP_DIR/.htaccess"
  only:
    - master

deploy:
  image: alpine:latest
  stage: deploy
  <<: *ssh_setup
  script:
    - rsync -avz --delete --exclude='config.php' --exclude='reviews_cache.json' --exclude='planet-iris-backup/' -e "ssh -p 65002" dist/planet-iris/browser/ $SERVER_USER@$SERVER_IP:$DEPLOY_DIR/
  only:
    - master
