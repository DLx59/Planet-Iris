stages:
  - build
  - deploy

variables:
  SSH_PRIVATE_KEY: $SSH_PRIVATE_KEY
  SERVER_USER: $SERVER_USER
  SERVER_IP: $SERVER_IP
  DEPLOY_DIR: $DEPLOY_DIR

.ssh_setup: &ssh_setup
  before_script:
    - apk update && apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan $SERVER_IP >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - echo -e "Host *\n  StrictHostKeyChecking no" >> ~/.ssh/config

build:
  image: node:lts-alpine
  stage: build
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run build:prod
  artifacts:
    paths:
      - dist/planet-iris/
    expire_in: 1 hour
  only:
    - master

deploy:
  image: alpine:latest
  stage: deploy
  <<: *ssh_setup
  script:
    - rsync -avz --delete
      --exclude='reviews_cache_*.json'
      -e "ssh"
      dist/planet-iris/
      $SERVER_USER@$SERVER_IP:$DEPLOY_DIR/dist/
    - ssh $SERVER_USER@$SERVER_IP "/root/.nvm/versions/node/v22.22.2/bin/pm2 restart planet-iris-site --update-env"
  only:
    - master
